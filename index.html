<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #050a15;
  --bg-secondary: #0a1628;
  --text-primary: #e8f4ff;
  --text-secondary: #7a9ec7;
  --glass-bg: rgba(15, 35, 70, 0.65);
  --glass-border: rgba(100, 180, 255, 0.15);
  --glass-shadow: rgba(0, 0, 0, 0.5);
  --accent: #00d4ff;
  --accent-secondary: #7b5cff;
  --accent-glow: rgba(0, 212, 255, 0.35);
  --mic-color: #00d4ff;
  --mic-glow: rgba(0, 212, 255, 0.5);
  --copy-bg: rgba(0, 212, 255, 0.15);
  --copy-border: rgba(0, 212, 255, 0.35);
  --clear-bg: rgba(255, 75, 100, 0.15);
  --clear-border: rgba(255, 75, 100, 0.4);
  --clear-color: #ff4b64;
  --particle-color: rgba(0, 212, 255, 0.25);
  --wave-color: rgba(0, 212, 255, 0.04);
  --selection-bg: rgba(255, 255, 255, 0.95);
  --selection-text: #050a15;
  --circle-animation-color: rgba(0, 212, 255, 0.5);
  --font-family: 'Baloo Da 2', cursive;
  --transition-speed: 0.5s;
}

html.light-mode {
  --bg-primary: #e8f4ff;
  --bg-secondary: #d0e8ff;
  --text-primary: #0a1628;
  --text-secondary: #3a5a8a;
  --glass-bg: rgba(255, 255, 255, 0.75);
  --glass-border: rgba(0, 150, 200, 0.2);
  --glass-shadow: rgba(0, 50, 100, 0.1);
  --particle-color: rgba(0, 150, 255, 0.15);
  --wave-color: rgba(0, 150, 255, 0.06);
  --selection-bg: rgba(255, 255, 255, 0.95);
  --selection-text: #050a15;
  --circle-animation-color: rgba(0, 150, 255, 0.4);
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-family);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition-speed), color var(--transition-speed);
  position: relative;
}

/* Premium Professional Background */
.bg-animation-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
  background: 
    radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(123, 92, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(0, 100, 150, 0.1) 0%, transparent 60%),
    linear-gradient(180deg, #050a15 0%, #0a1628 50%, #0d1f3c 100%);
}

html.light-mode .bg-animation-container {
  background: 
    radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 180, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(100, 120, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(180, 220, 255, 0.15) 0%, transparent 60%),
    linear-gradient(180deg, #e8f4ff 0%, #d0e8ff 50%, #c0d8f0 100%);
}

/* Animated Mesh Grid */
.mesh-grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 95px 95px;
  animation: meshMove 30s linear infinite;
  opacity: 0.6;
}

@keyframes meshMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-50%, -50%); }
}

/* Audio Visualizer Bars Background */
.visualizer-container {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 35%;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  padding: 0 5%;
  opacity: 0.4;
}

.visualizer-bar {
  width: 3px;
  background: linear-gradient(to top, var(--accent), var(--accent-secondary));
  border-radius: 3px 3px 0 0;
  animation: visualize 1.2s ease-in-out infinite;
  transform-origin: bottom;
}

.visualizer-bar:nth-child(1) { height: 15%; animation-delay: 0s; }
.visualizer-bar:nth-child(2) { height: 30%; animation-delay: 0.1s; }
.visualizer-bar:nth-child(3) { height: 45%; animation-delay: 0.2s; }
.visualizer-bar:nth-child(4) { height: 65%; animation-delay: 0.3s; }
.visualizer-bar:nth-child(5) { height: 40%; animation-delay: 0.4s; }
.visualizer-bar:nth-child(6) { height: 55%; animation-delay: 0.5s; }
.visualizer-bar:nth-child(7) { height: 75%; animation-delay: 0.6s; }
.visualizer-bar:nth-child(8) { height: 50%; animation-delay: 0.7s; }
.visualizer-bar:nth-child(9) { height: 35%; animation-delay: 0.8s; }
.visualizer-bar:nth-child(10) { height: 60%; animation-delay: 0.9s; }
.visualizer-bar:nth-child(11) { height: 70%; animation-delay: 1s; }
.visualizer-bar:nth-child(12) { height: 25%; animation-delay: 1.1s; }

@keyframes visualize {
  0%, 100% { transform: scaleY(0.3); opacity: 0.3; }
  50% { transform: scaleY(1); opacity: 0.8; }
}

/* Sound Wave Rings */
.sound-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  border-color: rgba(0, 212, 255, 0.15);
  animation: soundRingPulse 6s ease-out infinite;
  opacity: 0;
}

.sound-ring:nth-child(1) {
  width: 195px;
  height: 195px;
  top: 20%;
  left: 10%;
  animation-delay: 0s;
}

.sound-ring:nth-child(2) {
  width: 295px;
  height: 295px;
  top: 60%;
  right: 15%;
  animation-delay: 2s;
}

.sound-ring:nth-child(3) {
  width: 245px;
  height: 245px;
  bottom: 10%;
  left: 30%;
  animation-delay: 4s;
}

.sound-ring:nth-child(4) {
  width: 175px;
  height: 175px;
  top: 40%;
  right: 25%;
  animation-delay: 1s;
}

@keyframes soundRingPulse {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  20% {
    opacity: 0.4;
  }
  100% {
    transform: scale(1.5);
    opacity: 0;
  }
}

/* Floating Sound Particles */
.sound-particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
  animation: floatParticle 12s ease-in-out infinite;
  box-shadow: 0 0 5px var(--accent), 0 0 15px rgba(0, 212, 255, 0.3);
}

.sound-particle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
.sound-particle:nth-child(2) { top: 25%; left: 70%; animation-delay: 2s; }
.sound-particle:nth-child(3) { top: 45%; left: 15%; animation-delay: 4s; }
.sound-particle:nth-child(4) { top: 65%; left: 80%; animation-delay: 6s; }
.sound-particle:nth-child(5) { top: 35%; left: 50%; animation-delay: 8s; }
.sound-particle:nth-child(6) { top: 75%; left: 35%; animation-delay: 10s; }
.sound-particle:nth-child(7) { top: 55%; left: 90%; animation-delay: 1s; }
.sound-particle:nth-child(8) { top: 85%; left: 60%; animation-delay: 3s; }
.sound-particle:nth-child(9) { top: 10%; left: 45%; animation-delay: 5s; }
.sound-particle:nth-child(10) { top: 90%; left: 10%; animation-delay: 7s; }

@keyframes floatParticle {
  0%, 100% {
    transform: translateY(0) translateX(0) scale(1);
    opacity: 0.3;
  }
  25% {
    transform: translateY(-35px) translateX(15px) scale(1.2);
    opacity: 0.8;
  }
  50% {
    transform: translateY(-75px) translateX(-5px) scale(0.8);
    opacity: 0.5;
  }
  75% {
    transform: translateY(-25px) translateX(25px) scale(1.1);
    opacity: 0.7;
  }
}

/* Ambient Glow Orbs */
.ambient-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(75px);
  animation: ambientPulse 10s ease-in-out infinite;
}

.ambient-orb:nth-child(1) {
  width: 395px;
  height: 395px;
  top: -10%;
  left: -5%;
  background: radial-gradient(circle, rgba(0, 212, 255, 0.15), transparent 70%);
  animation-delay: 0s;
}

.ambient-orb:nth-child(2) {
  width: 345px;
  height: 345px;
  bottom: -10%;
  right: -5%;
  background: radial-gradient(circle, rgba(123, 92, 255, 0.12), transparent 70%);
  animation-delay: 3s;
}

.ambient-orb:nth-child(3) {
  width: 295px;
  height: 295px;
  top: 40%;
  left: 50%;
  background: radial-gradient(circle, rgba(0, 150, 200, 0.1), transparent 70%);
  animation-delay: 6s;
}

@keyframes ambientPulse {
  0%, 100% {
    transform: scale(1) translate(0, 0);
    opacity: 0.4;
  }
  50% {
    transform: scale(1.2) translate(15px, -15px);
    opacity: 0.7;
  }
}

/* Frequency Lines */
.frequency-line {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
  animation: frequencyMove 8s linear infinite;
}

.frequency-line:nth-child(1) { top: 20%; width: 55%; left: 20%; animation-delay: 0s; }
.frequency-line:nth-child(2) { top: 40%; width: 35%; left: 30%; animation-delay: 2s; }
.frequency-line:nth-child(3) { top: 60%; width: 65%; left: 15%; animation-delay: 4s; }
.frequency-line:nth-child(4) { top: 80%; width: 45%; left: 25%; animation-delay: 6s; }

@keyframes frequencyMove {
  0% {
    transform: translateX(-100%);
    opacity: 0;
  }
  50% {
    opacity: 0.6;
  }
  100% {
    transform: translateX(100%);
    opacity: 0;
  }
}

/* Main Content */
.main-content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 75px 15px 35px;
  animation: mainEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes mainEntrance {
  from {
    opacity: 0;
    transform: translateY(55px) scale(0.95);
    filter: blur(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

/* Page Title Container */
.title-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 11px;
  padding: 10px 25px;
  margin-bottom: 20px;
  box-shadow: 0 3px 27px var(--glass-shadow);
  animation: titleEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  transition: background var(--transition-speed), border-color var(--transition-speed), box-shadow var(--transition-speed);
}

.title-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4), transparent);
}

@keyframes titleEntrance {
  from {
    opacity: 0;
    transform: translateY(-25px) scale(0.8);
    filter: blur(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

/* Page Title */
.page-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 35px var(--accent-glow);
  letter-spacing: 2px;
  white-space: nowrap;
}

/* Title Divider */
.title-divider {
  width: 2px;
  height: 35px;
  background: linear-gradient(180deg, transparent, var(--accent), transparent);
  border-radius: 2px;
  opacity: 0.7;
}

/* BB-8 Toggle Container */
.theme-toggle-container {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 1000;
  transform: scale(0.65);
  transform-origin: right top;
  animation: toggleEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
}

@keyframes toggleEntrance {
  from {
    opacity: 0;
    transform: scale(0.35) translateX(45px) rotate(-20deg);
  }
  to {
    opacity: 1;
    transform: scale(0.65) translateX(0) rotate(0deg);
  }
}

/* BB-8 Toggle Styles */
.bb8-toggle {
  --toggle-size: 16px;
  --toggle-width: 10.625em;
  --toggle-height: 5.625em;
  --toggle-offset: calc((var(--toggle-height) - var(--bb8-diameter)) / 2);
  --toggle-bg: linear-gradient(#2c4770, #070e2b 35%, #628cac 50% 70%, #a6c5d4) no-repeat;
  --bb8-diameter: 4.375em;
  --radius: 99em;
  --transition: 0.4s;
  --accent: #de7d2f;
  --bb8-bg: #fff;
  cursor: pointer;
}

.bb8-toggle,
.bb8-toggle *,
.bb8-toggle *::before,
.bb8-toggle *::after {
  box-sizing: border-box;
}

.bb8-toggle__checkbox {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  display: none;
}

.bb8-toggle__container {
  width: var(--toggle-width);
  height: var(--toggle-height);
  background: var(--toggle-bg);
  background-size: 100% 11.25em;
  background-position-y: -5.625em;
  border-radius: var(--radius);
  position: relative;
  transition: var(--transition);
}

.bb8 {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: absolute;
  top: calc(var(--toggle-offset) - 1.688em + 0.188em);
  left: var(--toggle-offset);
  transition: var(--transition);
  z-index: 2;
}

.bb8__head-container {
  position: relative;
  transition: var(--transition);
  z-index: 2;
  transform-origin: 1.25em 3.75em;
}

.bb8__head {
  overflow: hidden;
  margin-bottom: -0.188em;
  width: 2.5em;
  height: 1.688em;
  background: linear-gradient(
      transparent 0.063em,
      dimgray 0.063em 0.313em,
      transparent 0.313em 0.375em,
      var(--accent) 0.375em 0.5em,
      transparent 0.5em 1.313em,
      silver 1.313em 1.438em,
      transparent 1.438em
    ),
    linear-gradient(
      45deg,
      transparent 0.188em,
      var(--bb8-bg) 0.188em 1.25em,
      transparent 1.25em
    ),
    linear-gradient(
      -45deg,
      transparent 0.188em,
      var(--bb8-bg) 0.188em 1.25em,
      transparent 1.25em
    ),
    linear-gradient(var(--bb8-bg) 1.25em, transparent 1.25em);
  border-radius: var(--radius) var(--radius) 0 0;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0.063em 0.125em gray);
}

.bb8__head::before {
  content: "";
  position: absolute;
  width: 0.563em;
  height: 0.563em;
  background: radial-gradient(
      0.125em circle at 0.25em 0.375em,
      red,
      transparent
    ),
    radial-gradient(
      0.063em circle at 0.375em 0.188em,
      var(--bb8-bg) 50%,
      transparent 100%
    ),
    linear-gradient(45deg, #000 0.188em, dimgray 0.313em 0.375em, #000 0.5em);
  border-radius: var(--radius);
  top: 0.413em;
  left: 50%;
  transform: translate(-50%);
  box-shadow: 0 0 0 0.089em lightgray, 0.563em 0.281em 0 -0.148em,
    0.563em 0.281em 0 -0.1em var(--bb8-bg), 0.563em 0.281em 0 -0.063em;
  z-index: 1;
  transition: var(--transition);
}

.bb8__head::after {
  content: "";
  position: absolute;
  bottom: 0.375em;
  left: 0;
  width: 100%;
  height: 0.188em;
  background: linear-gradient(
    to right,
    var(--accent) 0.125em,
    transparent 0.125em 0.188em,
    var(--accent) 0.188em 0.313em,
    transparent 0.313em 0.375em,
    var(--accent) 0.375em 0.938em,
    transparent 0.938em 1em,
    var(--accent) 1em 1.125em,
    transparent 1.125em 1.875em,
    var(--accent) 1.875em 2em,
    transparent 2em 2.063em,
    var(--accent) 2.063em 2.25em,
    transparent 2.25em 2.313em,
    var(--accent) 2.313em 2.375em,
    transparent 2.375em 2.438em,
    var(--accent) 2.438em
  );
  transition: var(--transition);
}

.bb8__antenna {
  position: absolute;
  transform: translateY(-90%);
  width: 0.059em;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: var(--transition);
}

.bb8__antenna:nth-child(1) {
  height: 0.938em;
  right: 0.938em;
  background: linear-gradient(#000 0.188em, silver 0.188em);
}

.bb8__antenna:nth-child(2) {
  height: 0.375em;
  left: 50%;
  transform: translate(-50%, -90%);
  background: silver;
}

.bb8__body {
  width: 4.375em;
  height: 4.375em;
  background: var(--bb8-bg);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  transition: var(--transition);
  z-index: 1;
  transform: rotate(45deg);
  background: linear-gradient(
      -90deg,
      var(--bb8-bg) 4%,
      var(--accent) 4% 10%,
      transparent 10% 90%,
      var(--accent) 90% 96%,
      var(--bb8-bg) 96%
    ),
    linear-gradient(
      var(--bb8-bg) 4%,
      var(--accent) 4% 10%,
      transparent 10% 90%,
      var(--accent) 90% 96%,
      var(--bb8-bg) 96%
    ),
    linear-gradient(
      to right,
      transparent 2.156em,
      silver 2.156em 2.219em,
      transparent 2.188em
    ),
    linear-gradient(
      transparent 2.156em,
      silver 2.156em 2.219em,
      transparent 2.188em
    );
  background-color: var(--bb8-bg);
}

.bb8__body::after {
  content: "";
  bottom: 1.5em;
  left: 0.563em;
  position: absolute;
  width: 0.188em;
  height: 0.188em;
  background: rgb(236, 236, 236);
  color: rgb(236, 236, 236);
  border-radius: 50%;
  box-shadow: 0.875em 0.938em, 0 -1.25em, 0.875em -2.125em, 2.125em -2.125em,
    3.063em -1.25em, 3.063em 0, 2.125em 0.938em;
}

.bb8__body::before {
  content: "";
  width: 2.625em;
  height: 2.625em;
  position: absolute;
  border-radius: 50%;
  z-index: 0.1;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 0.313em solid var(--accent);
  background: radial-gradient(
      1em circle at center,
      rgb(236, 236, 236) 50%,
      transparent 51%
    ),
    radial-gradient(1.25em circle at center, var(--bb8-bg) 50%, transparent 51%),
    linear-gradient(
      -90deg,
      transparent 42%,
      var(--accent) 42% 58%,
      transparent 58%
    ),
    linear-gradient(var(--bb8-bg) 42%, var(--accent) 42% 58%, var(--bb8-bg) 58%);
}

.artificial__hidden {
  position: absolute;
  border-radius: inherit;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.bb8__shadow {
  content: "";
  width: var(--bb8-diameter);
  height: 20%;
  border-radius: 50%;
  background: #3a271c;
  box-shadow: 0.313em 0 3.125em #3a271c;
  opacity: 0.25;
  position: absolute;
  bottom: 0;
  left: calc(var(--toggle-offset) - 0.938em);
  transition: var(--transition);
  transform: skew(-70deg);
  z-index: 1;
}

.bb8-toggle__scenery {
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  position: relative;
  border-radius: inherit;
}

.bb8-toggle__scenery::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 30%;
  bottom: 0;
  background: #b18d71;
  z-index: 1;
}

.bb8-toggle__cloud {
  z-index: 1;
  position: absolute;
  border-radius: 50%;
}

.bb8-toggle__cloud:nth-last-child(1) {
  width: 0.875em;
  height: 0.625em;
  filter: blur(0.125em) drop-shadow(0.313em 0.313em #ffffffae)
    drop-shadow(-0.625em 0 #fff) drop-shadow(-0.938em -0.125em #fff);
  right: 1.875em;
  top: 2.813em;
  background: linear-gradient(to top right, #ffffffae, #ffffffae);
  transition: var(--transition);
}

.bb8-toggle__cloud:nth-last-child(2) {
  top: 0.625em;
  right: 4.375em;
  width: 0.875em;
  height: 0.375em;
  background: #dfdedeae;
  filter: blur(0.125em) drop-shadow(-0.313em -0.188em #e0dfdfae)
    drop-shadow(-0.625em -0.188em #bbbbbbae) drop-shadow(-1em 0.063em #cfcfcfae);
  transition: 0.6s;
}

.bb8-toggle__cloud:nth-last-child(3) {
  top: 1.25em;
  right: 0.938em;
  width: 0.875em;
  height: 0.375em;
  background: #ffffffae;
  filter: blur(0.125em) drop-shadow(0.438em 0.188em #ffffffae)
    drop-shadow(-0.625em 0.313em #ffffffae);
  transition: 0.8s;
}

.gomrassen,
.hermes,
.chenini {
  position: absolute;
  border-radius: var(--radius);
  background: linear-gradient(#fff, #6e8ea2);
  top: 100%;
}

.gomrassen {
  left: 0.938em;
  width: 1.875em;
  height: 1.875em;
  box-shadow: 0 0 0.188em #ffffff52, 0 0 0.188em #6e8ea24b;
  transition: var(--transition);
}

.gomrassen::before,
.gomrassen::after {
  content: "";
  position: absolute;
  border-radius: inherit;
  box-shadow: inset 0 0 0.063em rgb(140, 162, 169);
  background: rgb(184, 196, 200);
}

.gomrassen::before {
  left: 0.313em;
  top: 0.313em;
  width: 0.438em;
  height: 0.438em;
}

.gomrassen::after {
  width: 0.25em;
  height: 0.25em;
  left: 1.25em;
  top: 0.75em;
}

.hermes {
  left: 3.438em;
  width: 0.625em;
  height: 0.625em;
  box-shadow: 0 0 0.125em #ffffff52, 0 0 0.125em #6e8ea24b;
  transition: 0.6s;
}

.chenini {
  left: 4.375em;
  width: 0.5em;
  height: 0.5em;
  box-shadow: 0 0 0.125em #ffffff52, 0 0 0.125em #6e8ea24b;
  transition: 0.8s;
}

.tatto-1,
.tatto-2 {
  position: absolute;
  width: 1.25em;
  height: 1.25em;
  border-radius: var(--radius);
}

.tatto-1 {
  background: #fefefe;
  right: 3.125em;
  top: 0.625em;
  box-shadow: 0 0 0.438em #fdf4e1;
  transition: var(--transition);
}

.tatto-2 {
  background: linear-gradient(#e6ac5c, #d75449);
  right: 1.25em;
  top: 2.188em;
  box-shadow: 0 0 0.438em #e6ad5c3d, 0 0 0.438em #d755494f;
  transition: 0.7s;
}

.bb8-toggle__star {
  position: absolute;
  width: 0.063em;
  height: 0.063em;
  background: #fff;
  border-radius: var(--radius);
  filter: drop-shadow(0 0 0.063em #fff);
  color: #fff;
  top: 100%;
}

.bb8-toggle__star:nth-child(1) {
  left: 3.75em;
  box-shadow: 1.25em 0.938em, -1.25em 2.5em, 0 1.25em, 1.875em 0.625em,
    -3.125em 1.875em, 1.25em 2.813em;
  transition: 0.2s;
}

.bb8-toggle__star:nth-child(2) {
  left: 4.688em;
  box-shadow: 0.625em 0, 0 0.625em, -0.625em -0.625em, 0.625em 0.938em,
    -3.125em 1.25em, 1.25em -1.563em;
  transition: 0.3s;
}

.bb8-toggle__star:nth-child(3) {
  left: 5.313em;
  box-shadow: -0.625em -0.625em, -2.188em 1.25em, -2.188em 0,
    -3.75em -0.625em, -3.125em -0.625em, -2.5em -0.313em, 0.75em -0.625em;
  transition: var(--transition);
}

.bb8-toggle__star:nth-child(4) {
  left: 1.875em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.5s;
}

.bb8-toggle__star:nth-child(5) {
  left: 5em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.6s;
}

.bb8-toggle__star:nth-child(6) {
  left: 2.5em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.7s;
}

.bb8-toggle__star:nth-child(7) {
  left: 3.438em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.8s;
}

/* BB-8 Toggle Actions */
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(1) { top: 0.625em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(2) { top: 1.875em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(3) { top: 1.25em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(4) { top: 3.438em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(5) { top: 3.438em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(6) { top: 0.313em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(7) { top: 1.875em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__cloud { right: -100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .gomrassen { top: 0.938em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .hermes { top: 2.5em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .chenini { top: 2.75em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container { background-position-y: 0; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .tatto-1 { top: 100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .tatto-2 { top: 100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8 { left: calc(100% - var(--bb8-diameter) - var(--toggle-offset)); }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8__shadow { left: calc(100% - var(--bb8-diameter) - var(--toggle-offset) + 0.938em); transform: skew(70deg); }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8__body { transform: rotate(225deg); }
.bb8-toggle__checkbox:hover + .bb8-toggle__container .bb8__head::before { left: 100%; }
.bb8-toggle__checkbox:not(:checked):hover + .bb8-toggle__container .bb8__antenna:nth-child(1) { right: 1.5em; }
.bb8-toggle__checkbox:hover + .bb8-toggle__container .bb8__antenna:nth-child(2) { left: 0.938em; }
.bb8-toggle__checkbox:hover + .bb8-toggle__container .bb8__head::after { background-position: 1.375em 0; }
.bb8-toggle__checkbox:checked:hover + .bb8-toggle__container .bb8__head::before { left: 0; }
.bb8-toggle__checkbox:checked:hover + .bb8-toggle__container .bb8__antenna:nth-child(2) { left: calc(100% - 0.938em); }
.bb8-toggle__checkbox:checked:hover + .bb8-toggle__container .bb8__head::after { background-position: -1.375em 0; }
.bb8-toggle__checkbox:active + .bb8-toggle__container .bb8__head-container { transform: rotate(25deg); }
.bb8-toggle__checkbox:checked:active + .bb8-toggle__container .bb8__head-container { transform: rotate(-25deg); }
.bb8:hover .bb8__head::before,
.bb8:hover .bb8__antenna:nth-child(2) { left: 50% !important; }
.bb8:hover .bb8__antenna:nth-child(1) { right: 0.938em !important; }
.bb8:hover .bb8__head::after { background-position: 0 0 !important; }

/* Language Selector */
.language-selector {
  position: relative;
  width: 100%;
  max-width: 595px;
  margin-bottom: 15px;
  animation: selectorEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
}

@keyframes selectorEntrance {
  from {
    opacity: 0;
    transform: translateY(-35px) scale(0.9);
    filter: blur(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

.lang-label {
  position: absolute;
  top: -8px;
  left: 10px;
  background: var(--bg-primary);
  padding: 2px 3px;
  border-radius: 7px;
  font-size: 0.7rem;
  color: var(--text-secondary);
  transition: background var(--transition-speed), color var(--transition-speed);
  z-index: 2;
}

.lang-options {
  display: flex;
  gap: 3px;
  padding: 7px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 11px;
  box-shadow: 0 3px 27px var(--glass-shadow);
  transition: background var(--transition-speed), border-color var(--transition-speed), box-shadow var(--transition-speed);
}

.lang-btn {
  flex: 1;
  padding: 5px 11px;
  border: 2px solid var(--glass-border);
  border-radius: 7px;
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.lang-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
  transition: left 0.5s ease;
}

.lang-btn:hover::before {
  left: 100%;
}

.lang-btn:hover {
  border-color: var(--accent);
  color: var(--text-primary);
  transform: translateY(-2px);
  box-shadow: 0 2px 10px var(--accent-glow);
}

.lang-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 15px var(--accent-glow);
  transform: translateY(-2px);
}

/* Glass Text Display Area */
.text-display-container {
  width: 100%;
  max-width: 595px;
  min-height: 295px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 19px;
  box-shadow: 
    0 3px 27px var(--glass-shadow),
    0 0 55px rgba(0, 212, 255, 0.05),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  padding: 25px;
  position: relative;
  overflow: hidden;
  transition: all var(--transition-speed);
  animation: displayEntrance 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
}

@keyframes displayEntrance {
  from {
    opacity: 0;
    transform: perspective(1000px) rotateX(10deg) translateY(45px) scale(0.9);
    filter: blur(15px);
  }
  to {
    opacity: 1;
    transform: perspective(1000px) rotateX(0deg) translateY(0) scale(1);
    filter: blur(0);
  }
}

.text-display-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4), transparent);
}

.text-display {
  width: 100%;
  min-height: 195px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-family);
  font-size: 1.4rem;
  line-height: 1.8;
  color: var(--text-primary);
  transition: color var(--transition-speed);
  overflow-y: auto;
  max-height: 395px;
}

.text-display::placeholder {
  color: var(--text-secondary);
  opacity: 0.5;
}

.text-display::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

/* Edit Mode Styling */
.text-display.editable {
  background: rgba(0, 212, 255, 0.05);
  border-radius: 7px;
}

/* Circular Typing Animation */
.typing-circle-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  pointer-events: none;
}

.typing-circle-container.active {
  display: block;
}

.typing-circle {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--accent);
  border-right-color: var(--accent);
  animation: spinCircle 1s linear infinite;
  position: relative;
}

.typing-circle::before {
  content: '';
  position: absolute;
  top: 5px;
  left: 5px;
  right: 5px;
  bottom: 5px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-bottom-color: rgba(0, 212, 255, 0.5);
  border-left-color: rgba(0, 212, 255, 0.5);
  animation: spinCircle 0.8s linear infinite reverse;
}

.typing-circle::after {
  content: '';
  position: absolute;
  top: 7px;
  left: 7px;
  right: 7px;
  bottom: 7px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: rgba(0, 212, 255, 0.3);
  animation: spinCircle 1.2s linear infinite;
}

.typing-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: pulseDot 0.8s ease-in-out infinite;
}

@keyframes spinCircle {
  to { transform: rotate(360deg); }
}

@keyframes pulseDot {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
}

/* Mic Button */
.mic-container {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: micEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s both;
}

@keyframes micEntrance {
  from {
    opacity: 0;
    transform: scale(0.3) translateY(35px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.mic-btn {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  color: #fff;
  font-size: 1.9rem;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 2px 20px var(--mic-glow);
}

.mic-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 30px var(--mic-glow);
}

.mic-btn:active {
  transform: scale(0.95);
}

.mic-btn.listening {
  animation: micPulse 1.5s ease-in-out infinite;
  background: linear-gradient(135deg, #ff4b64, #ff7b8a);
  box-shadow: 0 2px 20px rgba(255, 75, 100, 0.6);
}

@keyframes micPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(255, 75, 100, 0.6);
  }
  50% {
    box-shadow: 0 0 0 15px rgba(255, 75, 100, 0);
  }
}

.mic-rings {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid var(--mic-color);
  opacity: 0;
  animation: none;
}

.mic-btn.listening .mic-rings {
  animation: micRing 1.5s ease-out infinite;
}

.mic-rings:nth-child(2) {
  animation-delay: 0.3s;
}

.mic-rings:nth-child(3) {
  animation-delay: 0.6s;
}

@keyframes micRing {
  0% {
    transform: scale(1);
    opacity: 0.6;
  }
  100% {
    transform: scale(2.5);
    opacity: 0;
  }
}

.mic-status {
  margin-top: 7px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  transition: color var(--transition-speed);
}

.mic-status.active {
  color: #ff4b64;
  animation: statusBlink 1s ease-in-out infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.clear-btn:hover {

    min-height: 195px;
  }
  
  .mic-btn {
    width: 65px;
    height: 65px;
  }
  
  .action-buttons {
    flex-wrap: wrap;
    justify-content: center;
  }
}

/* Sound Wave Animation */
.sound-wave {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 15px;
  margin-top: 5px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.sound-wave.active {
  opacity: 1;
}

.wave-bar {
  width: 4px;
  background: var(--accent);
  border-radius: 2px;
  animation: waveBar 0.5s ease-in-out infinite alternate;
}

.wave-bar:nth-child(1) { height: 3px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 7px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 11px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 5px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 9px; animation-delay: 0.4s; }

@keyframes waveBar {
  from { height: 4px; }
  to { height: 13px; }
}
</style>
</head>
<body>

<!-- Premium Professional Background -->
<div class="bg-animation-container">
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="mesh-grid"></div>
  <div class="sound-ring"></div>
  <div class="sound-ring"></div>
  <div class="sound-ring"></div>
  <div class="sound-ring"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="sound-particle"></div>
  <div class="frequency-line"></div>
  <div class="frequency-line"></div>
  <div class="frequency-line"></div>
  <div class="frequency-line"></div>
  <div class="visualizer-container">
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
    <div class="visualizer-bar"></div>
  </div>
</div>

<!-- Voice Particles Container -->
<div class="voice-particles" id="voiceParticles"></div>

<!-- Theme Toggle -->
<div class="theme-toggle-container">
  <label class="bb8-toggle">
    <input class="bb8-toggle__checkbox" type="checkbox" id="themeToggle">
    <div class="bb8-toggle__container">
      <div class="bb8-toggle__scenery">
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="bb8-toggle__star"></div>
        <div class="tatto-1"></div>
        <div class="tatto-2"></div>
        <div class="gomrassen"></div>
        <div class="hermes"></div>
        <div class="chenini"></div>
        <div class="bb8-toggle__cloud"></div>
        <div class="bb8-toggle__cloud"></div>
        <div class="bb8-toggle__cloud"></div>
      </div>
      <div class="bb8">
        <div class="bb8__head-container">
          <div class="bb8__antenna"></div>
          <div class="bb8__antenna"></div>
          <div class="bb8__head"></div>
        </div>
        <div class="bb8__body"></div>
      </div>
      <div class="artificial__hidden">
        <div class="bb8__shadow"></div>
      </div>
    </div>
  </label>
</div>

<!-- Main Content -->
<div class="main-content">
  <!-- Page Title Container -->
  <div class="title-container">
    <h1 class="page-title">Voice to text</h1>
    <span class="title-divider"></span>
    <h1 class="page-title">audio to text</h1>
  </div>
  
  <!-- Language Selector -->
  <div class="language-selector">
    <span class="lang-label">Choose language</span>
    <div class="lang-options">
      <button class="lang-btn active" data-lang="bn-BD" onclick="selectLanguage(this)">বাংলা</button>
      <button class="lang-btn" data-lang="en-US" onclick="selectLanguage(this)">English</button>
    </div>
  </div>

  <!-- Glass Text Display -->
  <div class="text-display-container">
    <div class="typing-circle-container" id="typingCircle">
      <div class="typing-circle"></div>
      <div class="typing-dot"></div>
    </div>
    <textarea class="text-display" id="textDisplay" placeholder="Click the mic and start speaking..." readonly></textarea>
  </div>

  <!-- Sound Wave -->
  <div class="sound-wave" id="soundWave">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <!-- Mic Button -->
  <div class="mic-container">
    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
      <div class="mic-rings"></div>
      <div class="mic-rings"></div>
      <div class="mic-rings"></div>
      <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <span class="mic-status" id="micStatus">Press to give voice</span>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="action-btn edit-btn" id="editBtn" onclick="toggleEditMode()">
      <span class="btn-icon">✏️</span>
      <span class="btn-text" id="editBtnText">Edit text</span>
    </button>
    <button class="action-btn copy-btn" onclick="copyText()">
      <span class="btn-icon">📋</span>
      <span class="btn-text">Copy text</span>
    </button>
    <button class="action-btn clear-btn" onclick="clearText()">
      <span class="btn-icon">🗑️</span>
      <span class="btn-text">Delete text</span>
    </button>
  </div>
  
  <!-- Undo Button -->
  <div class="undo-btn-container">
    <button class="undo-btn" id="undoBtn" onclick="undoClear()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v6h6"/>
        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
      </svg>
    </button>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
// State
let isListening = false;
let isEditMode = false;
let recognition = null;
let selectedLang = 'bn-BD';
let finalTranscript = '';
let interimTranscript = '';
let deletedText = '';

// Elements
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const textDisplay = document.getElementById('textDisplay');
const typingCircle = document.getElementById('typingCircle');
const soundWave = document.getElementById('soundWave');
const toast = document.getElementById('toast');
const voiceParticlesContainer = document.getElementById('voiceParticles');
const themeToggle = document.getElementById('themeToggle');
const editBtn = document.getElementById('editBtn');
const editBtnText = document.getElementById('editBtnText');
const undoBtn = document.getElementById('undoBtn');

// Language Selection
function selectLanguage(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = btn.dataset.lang;
  
  const placeholders = {
    'bn-BD': 'Click the mic and start speaking...',
    'en-US': 'Click the mic and start speaking...'
  };
  textDisplay.placeholder = placeholders[selectedLang];
  
  if (isListening) {
    stopListening();
    setTimeout(() => startListening(), 300);
  }
}

// Speech Recognition Setup
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('❌ Your browser does not support voice recognition. Please try another browser.');
    return null;
  }
  
  const recog = new SpeechRecognition();
  recog.lang = selectedLang;
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 1;
  
  recog.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micStatus.textContent = 'Listening .......';
    micStatus.classList.add('active');
    typingCircle.classList.add('active');
    soundWave.classList.add('active');
  };
  
  recog.onresult = (event) => {
    interimTranscript = '';
    let newFinalTranscript = finalTranscript;
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        newFinalTranscript += transcript;
      } else {
        interimTranscript += transcript;
      }
    }
    
    finalTranscript = newFinalTranscript;
    textDisplay.value = finalTranscript + interimTranscript;
    textDisplay.scrollTop = textDisplay.scrollHeight;
    
    // Create voice particles
    createVoiceParticles();
  };
  
  recog.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'not-allowed') {
      showToast('❌ Allow microphone');
    } else if (event.error !== 'aborted') {
      showToast('⚠️ An error occurred. Please try again.');
    }
    stopListening();
  };
  
  recog.onend = () => {
    // Auto restart if still in listening mode
    if (isListening) {
      try {
        recog.start();
      } catch(e) {
        stopListening();
      }
    }
  };
  
  return recog;
}

// Toggle Listening
function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  recognition = initSpeechRecognition();
  if (recognition) {
    try {
      recognition.start();
    } catch(e) {
      showToast('⚠️ Could not start voice recognition');
    }
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    recognition.abort();
    recognition = null;
  }
  micBtn.classList.remove('listening');
  micStatus.textContent = 'Press to give voice';
  micStatus.classList.remove('active');
  typingCircle.classList.remove('active');
  soundWave.classList.remove('active');
}

// Toggle Edit Mode
function toggleEditMode() {
  isEditMode = !isEditMode;
  
  if (isEditMode) {
    textDisplay.removeAttribute('readonly');
    textDisplay.classList.add('editable');
    editBtn.classList.add('active');
    editBtnText.textContent = 'enabled';
    showToast('✏️ Edit mode enabled');
    textDisplay.focus();
  } else {
    textDisplay.setAttribute('readonly', true);
    textDisplay.classList.remove('editable');
    editBtn.classList.remove('active');
    editBtnText.textContent = 'Edit text';
    finalTranscript = textDisplay.value;
    showToast('✅ Changes saved');
  }
}

// Copy Text
function copyText() {
  const text = textDisplay.value.trim();
  if (!text) {
    const messages = {
      'bn-BD': '⚠️ No text to copy',
      'en-US': '⚠️ No text to copy'
    };
    showToast(messages[selectedLang] || '⚠️ No text to copy');
    return;
  }
  
  navigator.clipboard.writeText(text).then(() => {
    const messages = {
      'bn-BD': '✅ Text copied!',
      'en-US': '✅ Text copied!'
    };
    showToast(messages[selectedLang] || '✅ Text copied!');
  }).catch(() => {
    // Fallback
    textDisplay.select();
    document.execCommand('copy');
    showToast('✅ Text copied!');
  });
}

// Clear Text
function clearText() {
  const textToClear = textDisplay.value.trim();
  if (!textToClear) {
    const messages = {
      'bn-BD': '⚠️ No text to clear',
      'en-US': '⚠️ No text to clear'
    };
    showToast(messages[selectedLang] || '⚠️ No text to clear');
    return;
  }
  
  // Save deleted text for undo
  deletedText = textToClear;
  
  finalTranscript = '';
  interimTranscript = '';
  textDisplay.value = '';
  
  // Show undo button
  undoBtn.classList.add('show');
  
  const messages = {
    'bn-BD': '🗑️ All text cleared',
    'en-US': '🗑️ All text cleared'
  };
  showToast(messages[selectedLang] || '🗑️ Text cleared');
  
  // Clear animation effect
  const container = document.querySelector('.text-display-container');
  container.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  container.style.transform = 'scale(0.98)';
  container.style.opacity = '0.7';
  setTimeout(() => {
    container.style.transform = 'scale(1)';
    container.style.opacity = '1';
  }, 300);
}

// Undo Clear
function undoClear() {
  if (deletedText) {
    textDisplay.value = deletedText;
    finalTranscript = deletedText;
    showToast('✅ Text restored');
    
    // Hide undo button
    undoBtn.classList.remove('show');
    deletedText = '';
  }
}

// Show Toast
function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

// Voice Particles
function createVoiceParticles() {
  const containerRect = document.querySelector('.text-display-container').getBoundingClientRect();
  
  for (let i = 0; i < 3; i++) {
    const particle = document.createElement('div');
    particle.className = 'voice-particle';
    particle.style.left = (containerRect.left + Math.random() * containerRect.width) + 'px';
    particle.style.top = (containerRect.top + Math.random() * containerRect.height) + 'px';
    particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
    particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
    particle.style.background = `hsl(${Math.random() * 60 + 180}, 80%, 60%)`;
    voiceParticlesContainer.appendChild(particle);
    
    setTimeout(() => {
      particle.remove();
    }, 2000);
  }
}

// Theme Toggle
themeToggle.addEventListener('change', function() {
  if (this.checked) {
    document.documentElement.classList.add('light-mode');
  } else {
    document.documentElement.classList.remove('light-mode');
  }
});

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  // Set initial state
  textDisplay.value = '';
  
  // Add floating text particles animation
  setInterval(() => {
    if (isListening) {
      createVoiceParticles();
    }
  }, 500);
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.ctrlKey) {
    e.preventDefault();
    toggleListening();
  }
});
</script>
