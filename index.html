<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Typing - ভয়েস টাইপিং</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/baloo-da-2@5.0.8/index.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5.0.8/index.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/hind@5.0.18/index.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/orbitron@5.0.18/index.min.css" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #0a0e27;
  --bg-secondary: #131842;
  --text-primary: #ffffff;
  --text-secondary: #a0a8d0;
  --glass-bg: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: rgba(0, 0, 0, 0.3);
  --accent: #6c63ff;
  --accent-glow: rgba(108, 99, 255, 0.4);
  --mic-color: #6c63ff;
  --mic-glow: rgba(108, 99, 255, 0.6);
  --copy-bg: rgba(108, 99, 255, 0.2);
  --copy-border: rgba(108, 99, 255, 0.4);
  --clear-bg: rgba(255, 71, 87, 0.2);
  --clear-border: rgba(255, 71, 87, 0.5);
  --clear-color: #ff4757;
  --particle-color: rgba(108, 99, 255, 0.3);
  --wave-color: rgba(108, 99, 255, 0.05);
  --selection-bg: rgba(255, 255, 255, 0.9);
  --selection-text: #0a0e27;
  --circle-animation-color: rgba(108, 99, 255, 0.5);
  --font-family: 'Baloo Da 2', cursive;
  --transition-speed: 0.5s;
}

html.light-mode {
  --bg-primary: #f0f4ff;
  --bg-secondary: #e8edff;
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a7a;
  --glass-bg: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(255, 255, 255, 0.8);
  --glass-shadow: rgba(0, 0, 0, 0.1);
  --particle-color: rgba(108, 99, 255, 0.2);
  --wave-color: rgba(108, 99, 255, 0.08);
  --selection-bg: rgba(108, 99, 255, 0.3);
  --selection-text: #0a0e27;
  --circle-animation-color: rgba(108, 99, 255, 0.4);
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-family);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition-speed), color var(--transition-speed);
  position: relative;
}

/* Background Animated Elements */
.bg-animation-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.floating-orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, var(--particle-color), transparent);
  animation: floatOrb 8s ease-in-out infinite;
  opacity: 0.6;
}

.floating-orb:nth-child(1) {
  width: 120px;
  height: 120px;
  top: 10%;
  left: 10%;
  animation-delay: 0s;
  animation-duration: 10s;
}

.floating-orb:nth-child(2) {
  width: 80px;
  height: 80px;
  top: 60%;
  left: 80%;
  animation-delay: -2s;
  animation-duration: 8s;
}

.floating-orb:nth-child(3) {
  width: 150px;
  height: 150px;
  top: 30%;
  left: 70%;
  animation-delay: -4s;
  animation-duration: 12s;
}

.floating-orb:nth-child(4) {
  width: 60px;
  height: 60px;
  top: 80%;
  left: 20%;
  animation-delay: -1s;
  animation-duration: 7s;
}

.floating-orb:nth-child(5) {
  width: 100px;
  height: 100px;
  top: 50%;
  left: 40%;
  animation-delay: -3s;
  animation-duration: 9s;
}

.floating-orb:nth-child(6) {
  width: 90px;
  height: 90px;
  top: 15%;
  left: 50%;
  animation-delay: -5s;
  animation-duration: 11s;
}

@keyframes floatOrb {
  0%, 100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.4;
  }
  25% {
    transform: translate(30px, -40px) scale(1.1);
    opacity: 0.7;
  }
  50% {
    transform: translate(-20px, -80px) scale(0.9);
    opacity: 0.5;
  }
  75% {
    transform: translate(40px, -30px) scale(1.05);
    opacity: 0.6;
  }
}

.wave-bg {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 200px;
  background: var(--wave-color);
  animation: waveMove 15s linear infinite;
  border-radius: 50% 50% 0 0;
}

.wave-bg:nth-child(7) {
  height: 150px;
  opacity: 0.3;
  animation-duration: 20s;
  animation-direction: reverse;
}

.wave-bg:nth-child(8) {
  height: 100px;
  opacity: 0.2;
  animation-duration: 12s;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.grid-lines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(var(--particle-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--particle-color) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.1;
  animation: gridPulse 6s ease-in-out infinite;
}

@keyframes gridPulse {
  0%, 100% { opacity: 0.05; }
  50% { opacity: 0.15; }
}

.ring-particle {
  position: absolute;
  border: 2px solid var(--circle-animation-color);
  border-radius: 50%;
  animation: ringExpand 4s ease-out infinite;
  opacity: 0;
}

.ring-particle:nth-child(10) {
  top: 20%;
  left: 30%;
  animation-delay: 0s;
}

.ring-particle:nth-child(11) {
  top: 70%;
  left: 60%;
  animation-delay: -1.5s;
}

.ring-particle:nth-child(12) {
  top: 40%;
  left: 80%;
  animation-delay: -3s;
}

@keyframes ringExpand {
  0% {
    width: 10px;
    height: 10px;
    opacity: 0.8;
    transform: scale(0);
  }
  100% {
    width: 150px;
    height: 150px;
    opacity: 0;
    transform: scale(1);
  }
}

/* Main Content */
.main-content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 40px;
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BB-8 Toggle Container */
.theme-toggle-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  transform: scale(0.7);
  transform-origin: right top;
}

/* BB-8 Toggle Styles */
.bb8-toggle {
  --toggle-size: 16px;
  --toggle-width: 10.625em;
  --toggle-height: 5.625em;
  --toggle-offset: calc((var(--toggle-height) - var(--bb8-diameter)) / 2);
  --toggle-bg: linear-gradient(#2c4770, #070e2b 35%, #628cac 50% 70%, #a6c5d4) no-repeat;
  --bb8-diameter: 4.375em;
  --radius: 99em;
  --transition: 0.4s;
  --accent: #de7d2f;
  --bb8-bg: #fff;
  cursor: pointer;
}

.bb8-toggle,
.bb8-toggle *,
.bb8-toggle *::before,
.bb8-toggle *::after {
  box-sizing: border-box;
}

.bb8-toggle__checkbox {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  display: none;
}

.bb8-toggle__container {
  width: var(--toggle-width);
  height: var(--toggle-height);
  background: var(--toggle-bg);
  background-size: 100% 11.25em;
  background-position-y: -5.625em;
  border-radius: var(--radius);
  position: relative;
  transition: var(--transition);
}

.bb8 {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: absolute;
  top: calc(var(--toggle-offset) - 1.688em + 0.188em);
  left: var(--toggle-offset);
  transition: var(--transition);
  z-index: 2;
}

.bb8__head-container {
  position: relative;
  transition: var(--transition);
  z-index: 2;
  transform-origin: 1.25em 3.75em;
}

.bb8__head {
  overflow: hidden;
  margin-bottom: -0.188em;
  width: 2.5em;
  height: 1.688em;
  background: linear-gradient(
      transparent 0.063em,
      dimgray 0.063em 0.313em,
      transparent 0.313em 0.375em,
      var(--accent) 0.375em 0.5em,
      transparent 0.5em 1.313em,
      silver 1.313em 1.438em,
      transparent 1.438em
    ),
    linear-gradient(
      45deg,
      transparent 0.188em,
      var(--bb8-bg) 0.188em 1.25em,
      transparent 1.25em
    ),
    linear-gradient(
      -45deg,
      transparent 0.188em,
      var(--bb8-bg) 0.188em 1.25em,
      transparent 1.25em
    ),
    linear-gradient(var(--bb8-bg) 1.25em, transparent 1.25em);
  border-radius: var(--radius) var(--radius) 0 0;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0.063em 0.125em gray);
}

.bb8__head::before {
  content: "";
  position: absolute;
  width: 0.563em;
  height: 0.563em;
  background: radial-gradient(
      0.125em circle at 0.25em 0.375em,
      red,
      transparent
    ),
    radial-gradient(
      0.063em circle at 0.375em 0.188em,
      var(--bb8-bg) 50%,
      transparent 100%
    ),
    linear-gradient(45deg, #000 0.188em, dimgray 0.313em 0.375em, #000 0.5em);
  border-radius: var(--radius);
  top: 0.413em;
  left: 50%;
  transform: translate(-50%);
  box-shadow: 0 0 0 0.089em lightgray, 0.563em 0.281em 0 -0.148em,
    0.563em 0.281em 0 -0.1em var(--bb8-bg), 0.563em 0.281em 0 -0.063em;
  z-index: 1;
  transition: var(--transition);
}

.bb8__head::after {
  content: "";
  position: absolute;
  bottom: 0.375em;
  left: 0;
  width: 100%;
  height: 0.188em;
  background: linear-gradient(
    to right,
    var(--accent) 0.125em,
    transparent 0.125em 0.188em,
    var(--accent) 0.188em 0.313em,
    transparent 0.313em 0.375em,
    var(--accent) 0.375em 0.938em,
    transparent 0.938em 1em,
    var(--accent) 1em 1.125em,
    transparent 1.125em 1.875em,
    var(--accent) 1.875em 2em,
    transparent 2em 2.063em,
    var(--accent) 2.063em 2.25em,
    transparent 2.25em 2.313em,
    var(--accent) 2.313em 2.375em,
    transparent 2.375em 2.438em,
    var(--accent) 2.438em
  );
  transition: var(--transition);
}

.bb8__antenna {
  position: absolute;
  transform: translateY(-90%);
  width: 0.059em;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: var(--transition);
}

.bb8__antenna:nth-child(1) {
  height: 0.938em;
  right: 0.938em;
  background: linear-gradient(#000 0.188em, silver 0.188em);
}

.bb8__antenna:nth-child(2) {
  height: 0.375em;
  left: 50%;
  transform: translate(-50%, -90%);
  background: silver;
}

.bb8__body {
  width: 4.375em;
  height: 4.375em;
  background: var(--bb8-bg);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  transition: var(--transition);
  z-index: 1;
  transform: rotate(45deg);
  background: linear-gradient(
      -90deg,
      var(--bb8-bg) 4%,
      var(--accent) 4% 10%,
      transparent 10% 90%,
      var(--accent) 90% 96%,
      var(--bb8-bg) 96%
    ),
    linear-gradient(
      var(--bb8-bg) 4%,
      var(--accent) 4% 10%,
      transparent 10% 90%,
      var(--accent) 90% 96%,
      var(--bb8-bg) 96%
    ),
    linear-gradient(
      to right,
      transparent 2.156em,
      silver 2.156em 2.219em,
      transparent 2.188em
    ),
    linear-gradient(
      transparent 2.156em,
      silver 2.156em 2.219em,
      transparent 2.188em
    );
  background-color: var(--bb8-bg);
}

.bb8__body::after {
  content: "";
  bottom: 1.5em;
  left: 0.563em;
  position: absolute;
  width: 0.188em;
  height: 0.188em;
  background: rgb(236, 236, 236);
  color: rgb(236, 236, 236);
  border-radius: 50%;
  box-shadow: 0.875em 0.938em, 0 -1.25em, 0.875em -2.125em, 2.125em -2.125em,
    3.063em -1.25em, 3.063em 0, 2.125em 0.938em;
}

.bb8__body::before {
  content: "";
  width: 2.625em;
  height: 2.625em;
  position: absolute;
  border-radius: 50%;
  z-index: 0.1;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 0.313em solid var(--accent);
  background: radial-gradient(
      1em circle at center,
      rgb(236, 236, 236) 50%,
      transparent 51%
    ),
    radial-gradient(1.25em circle at center, var(--bb8-bg) 50%, transparent 51%),
    linear-gradient(
      -90deg,
      transparent 42%,
      var(--accent) 42% 58%,
      transparent 58%
    ),
    linear-gradient(var(--bb8-bg) 42%, var(--accent) 42% 58%, var(--bb8-bg) 58%);
}

.artificial__hidden {
  position: absolute;
  border-radius: inherit;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.bb8__shadow {
  content: "";
  width: var(--bb8-diameter);
  height: 20%;
  border-radius: 50%;
  background: #3a271c;
  box-shadow: 0.313em 0 3.125em #3a271c;
  opacity: 0.25;
  position: absolute;
  bottom: 0;
  left: calc(var(--toggle-offset) - 0.938em);
  transition: var(--transition);
  transform: skew(-70deg);
  z-index: 1;
}

.bb8-toggle__scenery {
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  position: relative;
  border-radius: inherit;
}

.bb8-toggle__scenery::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 30%;
  bottom: 0;
  background: #b18d71;
  z-index: 1;
}

.bb8-toggle__cloud {
  z-index: 1;
  position: absolute;
  border-radius: 50%;
}

.bb8-toggle__cloud:nth-last-child(1) {
  width: 0.875em;
  height: 0.625em;
  filter: blur(0.125em) drop-shadow(0.313em 0.313em #ffffffae)
    drop-shadow(-0.625em 0 #fff) drop-shadow(-0.938em -0.125em #fff);
  right: 1.875em;
  top: 2.813em;
  background: linear-gradient(to top right, #ffffffae, #ffffffae);
  transition: var(--transition);
}

.bb8-toggle__cloud:nth-last-child(2) {
  top: 0.625em;
  right: 4.375em;
  width: 0.875em;
  height: 0.375em;
  background: #dfdedeae;
  filter: blur(0.125em) drop-shadow(-0.313em -0.188em #e0dfdfae)
    drop-shadow(-0.625em -0.188em #bbbbbbae) drop-shadow(-1em 0.063em #cfcfcfae);
  transition: 0.6s;
}

.bb8-toggle__cloud:nth-last-child(3) {
  top: 1.25em;
  right: 0.938em;
  width: 0.875em;
  height: 0.375em;
  background: #ffffffae;
  filter: blur(0.125em) drop-shadow(0.438em 0.188em #ffffffae)
    drop-shadow(-0.625em 0.313em #ffffffae);
  transition: 0.8s;
}

.gomrassen,
.hermes,
.chenini {
  position: absolute;
  border-radius: var(--radius);
  background: linear-gradient(#fff, #6e8ea2);
  top: 100%;
}

.gomrassen {
  left: 0.938em;
  width: 1.875em;
  height: 1.875em;
  box-shadow: 0 0 0.188em #ffffff52, 0 0 0.188em #6e8ea24b;
  transition: var(--transition);
}

.gomrassen::before,
.gomrassen::after {
  content: "";
  position: absolute;
  border-radius: inherit;
  box-shadow: inset 0 0 0.063em rgb(140, 162, 169);
  background: rgb(184, 196, 200);
}

.gomrassen::before {
  left: 0.313em;
  top: 0.313em;
  width: 0.438em;
  height: 0.438em;
}

.gomrassen::after {
  width: 0.25em;
  height: 0.25em;
  left: 1.25em;
  top: 0.75em;
}

.hermes {
  left: 3.438em;
  width: 0.625em;
  height: 0.625em;
  box-shadow: 0 0 0.125em #ffffff52, 0 0 0.125em #6e8ea24b;
  transition: 0.6s;
}

.chenini {
  left: 4.375em;
  width: 0.5em;
  height: 0.5em;
  box-shadow: 0 0 0.125em #ffffff52, 0 0 0.125em #6e8ea24b;
  transition: 0.8s;
}

.tatto-1,
.tatto-2 {
  position: absolute;
  width: 1.25em;
  height: 1.25em;
  border-radius: var(--radius);
}

.tatto-1 {
  background: #fefefe;
  right: 3.125em;
  top: 0.625em;
  box-shadow: 0 0 0.438em #fdf4e1;
  transition: var(--transition);
}

.tatto-2 {
  background: linear-gradient(#e6ac5c, #d75449);
  right: 1.25em;
  top: 2.188em;
  box-shadow: 0 0 0.438em #e6ad5c3d, 0 0 0.438em #d755494f;
  transition: 0.7s;
}

.bb8-toggle__star {
  position: absolute;
  width: 0.063em;
  height: 0.063em;
  background: #fff;
  border-radius: var(--radius);
  filter: drop-shadow(0 0 0.063em #fff);
  color: #fff;
  top: 100%;
}

.bb8-toggle__star:nth-child(1) {
  left: 3.75em;
  box-shadow: 1.25em 0.938em, -1.25em 2.5em, 0 1.25em, 1.875em 0.625em,
    -3.125em 1.875em, 1.25em 2.813em;
  transition: 0.2s;
}

.bb8-toggle__star:nth-child(2) {
  left: 4.688em;
  box-shadow: 0.625em 0, 0 0.625em, -0.625em -0.625em, 0.625em 0.938em,
    -3.125em 1.25em, 1.25em -1.563em;
  transition: 0.3s;
}

.bb8-toggle__star:nth-child(3) {
  left: 5.313em;
  box-shadow: -0.625em -0.625em, -2.188em 1.25em, -2.188em 0,
    -3.75em -0.625em, -3.125em -0.625em, -2.5em -0.313em, 0.75em -0.625em;
  transition: var(--transition);
}

.bb8-toggle__star:nth-child(4) {
  left: 1.875em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.5s;
}

.bb8-toggle__star:nth-child(5) {
  left: 5em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.6s;
}

.bb8-toggle__star:nth-child(6) {
  left: 2.5em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.7s;
}

.bb8-toggle__star:nth-child(7) {
  left: 3.438em;
  width: 0.125em;
  height: 0.125em;
  transition: 0.8s;
}

/* BB-8 Toggle Actions */
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(1) { top: 0.625em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(2) { top: 1.875em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(3) { top: 1.25em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(4) { top: 3.438em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(5) { top: 3.438em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(6) { top: 0.313em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__star:nth-child(7) { top: 1.875em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8-toggle__cloud { right: -100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .gomrassen { top: 0.938em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .hermes { top: 2.5em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .chenini { top: 2.75em; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container { background-position-y: 0; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .tatto-1 { top: 100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .tatto-2 { top: 100%; }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8 { left: calc(100% - var(--bb8-diameter) - var(--toggle-offset)); }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8__shadow { left: calc(100% - var(--bb8-diameter) - var(--toggle-offset) + 0.938em); transform: skew(70deg); }
.bb8-toggle__checkbox:checked + .bb8-toggle__container .bb8__body { transform: rotate(225deg); }
.bb8-toggle__checkbox:hover + .bb8-toggle__container .bb8__head::before { left: 100%; }

<body>

<!-- Background Animation -->

<div class="main-content">
  <!-- Language Selector -->
  <div class="language-selector">
    <span class="lang-label">Choose language</span>
    <div class="lang-options">
      <button class="lang-btn active" data-lang="bn-BD" onclick="selectLanguage(this)">বাংলা</button>
      <button class="lang-btn" data-lang="en-US" onclick="selectLanguage(this)">English</button>

    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
      <div class="mic-rings"></div>

      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>

      <span class="btn-icon">📋</span>

    </button>
    <button class="action-btn clear-btn" onclick="clearText()">
      <span class="btn-icon">🗑️</span>

    </button>

<!-- Toast Notification -->

<script>
// State
let isListening = false;
let recognition = null;
let selectedLang = 'bn-BD';
let finalTranscript = '';
let interimTranscript = '';

// Elements
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const textDisplay = document.getElementById('textDisplay');
const typingCircle = document.getElementById('typingCircle');
const soundWave = document.getElementById('soundWave');
const toast = document.getElementById('toast');
const voiceParticlesContainer = document.getElementById('voiceParticles');
const themeToggle = document.getElementById('themeToggle');

// Language Selection
function selectLanguage(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = btn.dataset.lang;
  
  const placeholders = {
    'bn-BD': 'Click the mic and start speaking...',
    'en-US': 'Click the mic and start speaking...',
    'hi-IN': 'Click the mic and start speaking...'
  };
  textDisplay.placeholder = placeholders[selectedLang];
  
  if (isListening) {
    stopListening();
    setTimeout(() => startListening(), 300);
  }
}

// Speech Recognition Setup
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('❌ Your browser does not support voice recognition. Please try another browser.');
    return null;
  }
  
  const recog = new SpeechRecognition();
  recog.lang = selectedLang;
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 1;
  
  recog.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micStatus.textContent = 'Listening .......';
    micStatus.classList.add('active');
    typingCircle.classList.add('active');
    soundWave.classList.add('active');
  };
  
  recog.onresult = (event) => {
    interimTranscript = '';
    let newFinalTranscript = finalTranscript;
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        newFinalTranscript += transcript;
      } else {
        interimTranscript += transcript;
      }
    }
    
    finalTranscript = newFinalTranscript;
    textDisplay.value = finalTranscript + interimTranscript;
    textDisplay.scrollTop = textDisplay.scrollHeight;
    
    // Create voice particles
    createVoiceParticles();
  };
  
  recog.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'not-allowed') {
      showToast('❌ Allow microphone');
    } else if (event.error !== 'aborted') {
      showToast('⚠️ An error occurred. Please try again.');
    }
    stopListening();
  };
  
  recog.onend = () => {
    // Auto restart if still in listening mode
    if (isListening) {
      try {
        recog.start();
      } catch(e) {
        stopListening();
      }
    }
  };
  
  return recog;
}

// Toggle Listening
function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  recognition = initSpeechRecognition();
  if (recognition) {
    try {
      recognition.start();
    } catch(e) {
      showToast('⚠️ Could not start voice recognition');
    }
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    recognition.abort();
    recognition = null;
  }
  micBtn.classList.remove('listening');
  micStatus.textContent = 'Press to give voice';
  micStatus.classList.remove('active');
  typingCircle.classList.remove('active');
  soundWave.classList.remove('active');
}

// Copy Text
function copyText() {
  const text = textDisplay.value.trim();
  if (!text) {
    const messages = {
      'bn-BD': '⚠️ No text to copy',
      'en-US': '⚠️ No text to copy',
      'hi-IN': '⚠️ No text to copy'
    };
    showToast(messages[selectedLang] || '⚠️ No text to copy');
    return;
  }
  
  navigator.clipboard.writeText(text).then(() => {
    const messages = {
      'bn-BD': '✅ Text copied!',
      'en-US': '✅ Text copied!',
      'hi-IN': '✅ Text copied!'
    };
    showToast(messages[selectedLang] || '✅ Text copied!');
  }).catch(() => {
    // Fallback
    textDisplay.select();
    document.execCommand('copy');
    showToast('✅ Text copied!');
  });
}

// Clear Text
function clearText() {
  if (!textDisplay.value.trim()) {
    const messages = {
      'bn-BD': '⚠️ No text to clear',
      'en-US': '⚠️ No text to clear',
      'hi-IN': '⚠️ No text to clear'
    };
    showToast(messages[selectedLang] || '⚠️ No text to clear');
    return;
  }
  
  finalTranscript = '';
  interimTranscript = '';
  textDisplay.value = '';
  
  const messages = {
    'bn-BD': '🗑️ All text cleared',
    'en-US': '🗑️ All text cleared',
    'hi-IN': '🗑️ All text cleared'
  };
  showToast(messages[selectedLang] || '🗑️ Text cleared');
  
  // Clear animation effect
  const container = document.querySelector('.text-display-container');
  container.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  container.style.transform = 'scale(0.98)';
  container.style.opacity = '0.7';
  setTimeout(() => {
    container.style.transform = 'scale(1)';
    container.style.opacity = '1';
  }, 300);
}

// Show Toast
function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

// Voice Particles
function createVoiceParticles() {
  const containerRect = document.querySelector('.text-display-container').getBoundingClientRect();
  
  for (let i = 0; i < 3; i++) {
    const particle = document.createElement('div');
    particle.className = 'voice-particle';
    particle.style.left = (containerRect.left + Math.random() * containerRect.width) + 'px';
    particle.style.top = (containerRect.top + Math.random() * containerRect.height) + 'px';
    particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
    particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
    particle.style.background = `hsl(${Math.random() * 60 + 220}, 70%, 60%)`;
    voiceParticlesContainer.appendChild(particle);
    
    setTimeout(() => {
      particle.remove();
    }, 2000);
  }
}

// Theme Toggle
themeToggle.addEventListener('change', function() {
  if (this.checked) {
    document.documentElement.classList.add('light-mode');
  } else {
    document.documentElement.classList.remove('light-mode');
  }
});

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  // Set initial state
  textDisplay.value = '';
  
  // Add floating text particles animation
  setInterval(() => {
    if (isListening) {
      createVoiceParticles();
    }
  }, 500);
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.ctrlKey) {
    e.preventDefault();
    toggleListening();
  }
});
</script>
